<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>local-movie-cast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>local-movie-cast</h1>
    <div id="devices" class="devices"></div>
  </header>

  <main>
    <section class="browser">
      <div class="crumbs" id="crumbs"></div>
      <section id="recent-section" class="recent-section" hidden>
        <h2 class="section-title">Недавно</h2>
        <div id="recent" class="recent"></div>
      </section>
      <div id="folders" class="folders"></div>
      <div id="files" class="files"></div>
      <div id="empty" class="empty" hidden>Пусто</div>
    </section>

    <aside class="sidebar">
      <h2 id="file-title">Выбери файл</h2>
      <div id="file-meta" class="meta"></div>
      <h3 class="tracks-title" hidden>Аудиодорожки</h3>
      <ul id="tracks" class="tracks"></ul>
      <button id="cast-btn" class="cast-btn" disabled>
        <span class="material-symbols-outlined">cast</span>
        <span class="cast-label">Кастить</span>
      </button>
    </aside>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
