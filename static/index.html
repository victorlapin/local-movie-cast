<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1d2024" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#eeeef3" media="(prefers-color-scheme: light)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="movie-cast">
  <link rel="manifest" href="/static/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/icons/icon-512.png">
  <title>local-movie-cast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
  <link rel="stylesheet" href="/static/style.css">
  <script>
    // Применяем тему до первой отрисовки, чтобы не моргало.
    (function() {
      var t = localStorage.getItem("theme");
      if (!t) t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</head>
<body>
  <header>
    <h1>local-movie-cast <span id="app-version" class="app-version"></span></h1>
    <div id="devices" class="devices"></div>
    <button id="theme-toggle" class="theme-toggle" title="Сменить тему">
      <span class="material-symbols-outlined"></span>
    </button>
  </header>

  <main>
    <section class="browser">
      <div class="search-bar">
        <span class="material-symbols-outlined search-icon">search</span>
        <input id="search-input" class="search-input" type="search" placeholder="Поиск по библиотекам" autocomplete="off">
        <button id="search-clear" class="search-clear" title="Очистить" hidden>
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="browser-bar">
        <div class="crumbs" id="crumbs"></div>
        <div class="browser-controls">
          <select id="sort-select" class="sort-select" title="Сортировка">
            <option value="name-asc">Имя ↑</option>
            <option value="name-desc">Имя ↓</option>
            <option value="date-desc">Новее</option>
            <option value="date-asc">Старее</option>
            <option value="size-desc">Больше</option>
            <option value="size-asc">Меньше</option>
          </select>
          <div class="view-toggle" role="group" aria-label="Вид библиотеки">
            <button id="view-grid" class="view-btn" title="Плитки">
              <span class="material-symbols-outlined">grid_view</span>
            </button>
            <button id="view-list" class="view-btn" title="Список">
              <span class="material-symbols-outlined">view_list</span>
            </button>
          </div>
        </div>
      </div>
      <section id="recent-section" class="recent-section" hidden>
        <h2 class="section-title">Недавно</h2>
        <div id="recent" class="recent"></div>
      </section>
      <section id="libraries-section" class="libraries-section" hidden>
        <div class="libraries-header">
          <h2 class="section-title">Библиотеки</h2>
          <div id="stats-line" class="stats-line"></div>
        </div>
        <div id="libraries" class="libraries"></div>
      </section>
      <div id="folders" class="folders"></div>
      <div id="files" class="files"></div>
      <div id="empty" class="empty" hidden>Пусто</div>
      <section id="search-section" class="search-section" hidden>
        <h2 class="section-title" id="search-status"></h2>
        <div id="search-results" class="files"></div>
      </section>
    </section>

    <div class="sheet-backdrop" id="sheet-backdrop"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sheet-handle"></div>
      <button class="sheet-close" id="sheet-close" title="Закрыть">
        <span class="material-symbols-outlined">close</span>
      </button>
      <div class="file-header">
        <h2 id="file-title">Выбери файл</h2>
        <button id="reveal-btn" class="reveal-btn" title="Показать в проводнике" disabled>
          <span class="material-symbols-outlined">folder_open</span>
        </button>
      </div>
      <div id="file-meta" class="meta"></div>
      <h3 class="tracks-title" hidden>Аудиодорожки</h3>
      <ul id="tracks" class="tracks"></ul>
      <div id="cast-controls" class="cast-controls"></div>
    </aside>
  </main>

  <dialog id="confirm-modal" class="modal">
    <div class="modal-content">
      <span class="modal-icon material-symbols-outlined">help</span>
      <p class="modal-message"></p>
      <div class="modal-actions">
        <button type="button" class="cast-btn-outlined" data-confirm="cancel">Отмена</button>
        <button type="button" class="cast-btn cast-btn-compact" data-confirm="ok">ОК</button>
      </div>
    </div>
  </dialog>

  <dialog id="library-add-modal" class="modal">
    <form class="modal-content" method="dialog" id="library-add-form">
      <span class="modal-icon material-symbols-outlined">create_new_folder</span>
      <h3 class="modal-title">Добавить библиотеку</h3>
      <p class="modal-message">Укажи путь к папке с фильмами.</p>
      <input type="text" id="library-add-path" class="modal-input" placeholder="D:\Movies" required>
      <div class="modal-actions">
        <button type="button" class="cast-btn-outlined" id="library-add-cancel">Отмена</button>
        <button type="submit" class="cast-btn cast-btn-compact">Добавить</button>
      </div>
    </form>
  </dialog>

  <dialog id="modal" class="modal" aria-live="polite">
    <div class="modal-content">
      <span class="modal-icon material-symbols-outlined"></span>
      <h3 class="modal-title"></h3>
      <p class="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-ok" class="cast-btn-outlined">ОК</button>
      </div>
    </div>
  </dialog>

  <script src="/static/app.js"></script>
</body>
</html>
