<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>local-movie-cast</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>local-movie-cast</h1>
    <div id="devices" class="devices"></div>
  </header>

  <main>
    <section class="browser">
      <div class="crumbs" id="crumbs"></div>
      <div id="folders" class="folders"></div>
      <div id="files" class="files"></div>
      <div id="empty" class="empty" hidden>Пусто</div>
    </section>

    <aside class="sidebar">
      <h2 id="file-title">Выбери файл</h2>
      <div id="file-meta" class="meta"></div>
      <h3 class="tracks-title" hidden>Аудиодорожки</h3>
      <ul id="tracks" class="tracks"></ul>
      <button id="cast-btn" class="cast-btn" disabled>Кастить</button>
    </aside>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
